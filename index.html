<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品詞クイズ | Parts of Speech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,600;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap">
  <style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #F6F4F1;
  color: #1C1C1C;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.screen {
  width: 100%;
  max-width: 560px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

/* ============================================================
   START SCREEN
   ============================================================ */
.start-title {
  font-family: 'Crimson Pro', serif;
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  margin-bottom: 0.25rem;
}
.start-sub {
  font-size: 0.78rem;
  color: #888;
  font-weight: 300;
  letter-spacing: 0.1em;
  margin-bottom: 3rem;
}
.section-label {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #999;
  font-weight: 400;
  margin-bottom: 0.75rem;
  align-self: flex-start;
}

/* Pill buttons (numQ selector) */
.pill-group {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 2.5rem;
  width: 100%;
}
.pill {
  padding: 0.45rem 1.25rem;
  border: 1.5px solid #D8D5D0;
  border-radius: 100px;
  font-size: 0.85rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  background: transparent;
  color: #555;
  cursor: pointer;
  transition: all 0.15s ease;
}
.pill:hover { border-color: #999; color: #1C1C1C; }
.pill.active {
  background: #1C1C1C;
  border-color: #1C1C1C;
  color: #fff;
}

/* Level cards */
.level-cards {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 3rem;
  width: 100%;
}
.level-card {
  flex: 1;
  padding: 1.1rem 0.75rem;
  border: 1.5px solid #D8D5D0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
  background: transparent;
  font-family: inherit;
  color: #555;
}
.level-card:hover { border-color: #999; color: #1C1C1C; }
.level-card.active {
  border-color: #1C1C1C;
  background: #1C1C1C;
  color: #fff;
}
.level-card .lv-num {
  font-family: 'Crimson Pro', serif;
  font-size: 1.5rem;
  font-weight: 300;
  display: block;
  margin-bottom: 0.35rem;
}
.level-card .lv-example {
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  display: block;
  margin-bottom: 0.35rem;
  opacity: 0.8;
}
.level-card .lv-hint {
  font-size: 0.72rem;
  opacity: 0.65;
  font-weight: 300;
  line-height: 1.3;
}
.level-card.active .lv-hint { opacity: 0.7; }

.start-btn {
  padding: 0.85rem 3rem;
  background: #1C1C1C;
  color: #fff;
  border: none;
  border-radius: 100px;
  font-size: 0.9rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: opacity 0.15s ease;
}
.start-btn:hover { opacity: 0.75; }

/* ============================================================
   QUIZ SCREEN
   ============================================================ */
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  margin-bottom: 1.25rem;
}
.quiz-progress {
  font-size: 0.78rem;
  color: #999;
  letter-spacing: 0.06em;
}
.quiz-progress strong { color: #1C1C1C; }
.quiz-level-badge {
  font-size: 0.7rem;
  padding: 0.2rem 0.6rem;
  border: 1px solid #D8D5D0;
  border-radius: 100px;
  color: #aaa;
  letter-spacing: 0.06em;
}
.quiz-timer {
  font-family: 'Crimson Pro', serif;
  font-size: 1.2rem;
  font-weight: 300;
  color: #aaa;
  letter-spacing: 0.05em;
  min-width: 52px;
  text-align: right;
  transition: color 0.2s;
}
.quiz-timer.recorded { color: #1C1C1C; }

/* Progress bar */
.progress-bar-wrap {
  width: 100%;
  height: 2px;
  background: #E8E5E0;
  border-radius: 2px;
  margin-bottom: 2.5rem;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: #1C1C1C;
  border-radius: 2px;
  transition: width 0.35s ease;
}

/* Word card */
.word-card {
  width: 100%;
  min-height: 140px;
  border: 1.5px solid #D8D5D0;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 2rem;
  padding: 2rem 1.5rem;
  background: #fff;
  transition: border-color 0.2s ease;
  gap: 0.5rem;
}
.word-card.correct   { border-color: #3A7D5E; }
.word-card.incorrect { border-color: #C04A4A; }

.word-display {
  font-family: 'Crimson Pro', serif;
  font-size: 2.6rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  line-height: 1;
  color: #1C1C1C;
}
.word-stem { color: #1C1C1C; }
.word-tail { color: #3A7D5E; font-weight: 600; }
.word-full-reveal {
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  color: #999;
  margin-top: 0.2rem;
}
.word-ja {
  font-size: 0.9rem;
  color: #888;
  font-weight: 300;
  margin-top: 0.15rem;
}
.answer-feedback {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 0.2rem;
  font-size: 0.82rem;
}
.feedback-tag {
  padding: 0.2rem 0.75rem;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.feedback-tag.ok { background: #EAF5EF; color: #3A7D5E; }
.feedback-tag.ng { background: #FDEAEA; color: #C04A4A; }
.feedback-correct-label { color: #888; font-size: 0.78rem; }
.feedback-correct-label strong { color: #3A7D5E; }

/* Choices */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
  width: 100%;
  margin-bottom: 1.5rem;
}
.choice-btn {
  padding: 0.85rem;
  border: 1.5px solid #D8D5D0;
  border-radius: 10px;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.12s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.15rem;
}
.choice-btn .c-ja { font-size: 0.95rem; color: #1C1C1C; font-weight: 400; }
.choice-btn .c-en { font-size: 0.7rem; color: #bbb; letter-spacing: 0.05em; }
.choice-btn:not(:disabled):hover { border-color: #999; }
.choice-btn:disabled { cursor: default; }
.choice-btn.sel-correct { background: #EAF5EF; border-color: #3A7D5E; }
.choice-btn.sel-correct .c-ja,
.choice-btn.sel-correct .c-en { color: #3A7D5E; }
.choice-btn.sel-wrong   { background: #FDEAEA; border-color: #C04A4A; }
.choice-btn.sel-wrong .c-ja,
.choice-btn.sel-wrong .c-en { color: #C04A4A; }
.choice-btn.is-answer   { border-color: #3A7D5E; }
.choice-btn.is-answer .c-ja,
.choice-btn.is-answer .c-en { color: #3A7D5E; }
.choice-btn.dimmed      { opacity: 0.3; }

/* Next hint */
.next-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  width: 100%;
  justify-content: center;
}
.space-hint {
  font-size: 0.75rem;
  color: #ccc;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.key-badge {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border: 1px solid #D8D5D0;
  border-radius: 4px;
  font-size: 0.7rem;
  color: #bbb;
  background: #fafafa;
}
.next-btn {
  padding: 0.55rem 1.5rem;
  background: #1C1C1C;
  color: #fff;
  border: none;
  border-radius: 100px;
  font-size: 0.8rem;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.next-btn:hover { opacity: 0.75; }

/* ============================================================
   RESULT SCREEN
   ============================================================ */
.result-header {
  text-align: center;
  margin-bottom: 2rem;
}
.result-score {
  font-family: 'Crimson Pro', serif;
  font-size: 4rem;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.02em;
}
.result-score .r-denom {
  font-size: 1.8rem;
  color: #999;
}
.result-pct {
  font-size: 0.82rem;
  color: #999;
  margin-top: 0.4rem;
  letter-spacing: 0.04em;
}

.result-stats {
  display: flex;
  gap: 1px;
  background: #E8E5E0;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1.5rem;
  width: 100%;
}
.r-stat {
  flex: 1;
  padding: 0.9rem 0.5rem;
  background: #fff;
  text-align: center;
}
.r-stat:first-child { border-radius: 12px 0 0 12px; }
.r-stat:last-child  { border-radius: 0 12px 12px 0; }
.r-stat .sv {
  font-family: 'Crimson Pro', serif;
  font-size: 1.7rem;
  font-weight: 300;
  display: block;
}
.r-stat .sl {
  font-size: 0.68rem;
  color: #aaa;
  letter-spacing: 0.06em;
  margin-top: 0.1rem;
}

/* Answer list */
.result-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-bottom: 1.5rem;
  max-height: 280px;
  overflow-y: auto;
  padding-right: 2px;
}
.result-list::-webkit-scrollbar { width: 3px; }
.result-list::-webkit-scrollbar-track { background: transparent; }
.result-list::-webkit-scrollbar-thumb { background: #D8D5D0; border-radius: 2px; }

.result-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.65rem 0.85rem;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #ECEAE6;
}
.r-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.r-dot.ok { background: #3A7D5E; }
.r-dot.ng { background: #C04A4A; }
.r-word {
  font-family: 'Crimson Pro', serif;
  font-size: 1.05rem;
  font-weight: 300;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.r-word-ja {
  font-size: 0.72rem;
  color: #aaa;
  font-family: 'Noto Sans JP', sans-serif;
}
.r-pos {
  font-size: 0.72rem;
  color: #888;
  white-space: nowrap;
}
.r-pos .ng-pos { color: #C04A4A; text-decoration: line-through; margin-right: 0.3rem; }
.r-pos .ok-pos { color: #3A7D5E; }
.r-time {
  font-family: 'Crimson Pro', serif;
  font-size: 0.85rem;
  color: #ccc;
  min-width: 36px;
  text-align: right;
}

/* Log section */
.log-section {
  width: 100%;
  margin-bottom: 1.5rem;
}
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.5rem;
}
.log-count {
  font-size: 0.72rem;
  color: #bbb;
}
.log-list {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.log-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.85rem;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #ECEAE6;
  font-size: 0.78rem;
}
.log-item.current { border-color: #3A7D5E; background: #F4FAF7; }
.log-item.current .log-date { color: #3A7D5E; }
.log-date {
  color: #888;
  flex: 1;
  font-size: 0.75rem;
}
.log-lv {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border: 1px solid #D8D5D0;
  border-radius: 100px;
  color: #aaa;
}
.log-score {
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  color: #555;
  min-width: 40px;
  text-align: right;
}
.log-avgtime {
  color: #bbb;
  font-size: 0.75rem;
  min-width: 42px;
  text-align: right;
}
.now-badge {
  font-size: 0.65rem;
  padding: 0.1rem 0.45rem;
  background: #3A7D5E;
  color: #fff;
  border-radius: 100px;
}

.restart-btn {
  padding: 0.85rem 3rem;
  background: #1C1C1C;
  color: #fff;
  border: none;
  border-radius: 100px;
  font-size: 0.9rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: opacity 0.15s ease;
}
.restart-btn:hover { opacity: 0.75; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 420px) {
  .screen { padding: 1.5rem 1rem; }
  .level-cards { gap: 0.5rem; }
  .level-card { padding: 0.9rem 0.5rem; }
  .level-card .lv-num { font-size: 1.3rem; }
  .level-card .lv-example { font-size: 0.85rem; }
  .level-card .lv-hint { font-size: 0.65rem; }
  .word-display { font-size: 2rem; }
  .result-score { font-size: 3rem; }
}
  </style>
</head>

  <script>
/**

 * 全単語データ。グローバル変数 QuizWords として公開。

  var CHOICES = ['verb', 'noun', 'adjective', 'adverb'];

  var REGULAR_WORDS = [
    // NOUNS: -tion
    { word: 'education',      suffix: '-tion', pos: 'noun', ja: '教育' },

/**
 * storage.js
 * localStorage によるクイズ履歴管理。グローバル QuizStorage として公開。
 */

var QuizStorage = (function () {
  var KEY = 'suffix_quiz_log';
  var MAX_ENTRIES = 100;

  function getLog() {
    try {
      return JSON.parse(localStorage.getItem(KEY)) || [];
    } catch (e) {
      return [];
    }
  }

  function saveResult(entry) {
    try {
      var log = getLog();
      log.unshift(entry);
      if (log.length > MAX_ENTRIES) log.length = MAX_ENTRIES;
      localStorage.setItem(KEY, JSON.stringify(log));
    } catch (e) {
      // localStorage 利用不可の場合は無視
    }
  }

  function getTotalAttempts() {
    return getLog().length;
  }

  function formatDate(iso) {
    var d = new Date(iso);
    var pad = function (n) { return String(n).padStart(2, '0'); };
    return d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate()) +
           ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  return {
    getLog: getLog,
    saveResult: saveResult,
    getTotalAttempts: getTotalAttempts,
    formatDate: formatDate,
  };
})();

  <script>
/**
 * helpers.js
 * 純粋ユーティリティ関数。グローバル QuizHelpers として公開。
 */

var QuizHelpers = (function () {

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function splitWord(word, suffix) {
    if (!suffix) return { stem: word, tail: '' };
    var raw = suffix.replace('-', '');
    var idx = word.lastIndexOf(raw);
    if (idx === -1) return { stem: word, tail: '' };
    return { stem: word.slice(0, idx), tail: word.slice(idx) };
  }

  function fmtTime(seconds) {
    return Number(seconds).toFixed(1);
  }

  return { shuffle: shuffle, splitWord: splitWord, fmtTime: fmtTime };
})();
  </script>

  <script>
/**
 * components/QuizScreen.js
 * クイズ画面を描画。グローバル QuizScreen として公開。
 */

var QuizScreen = (function () {
  var POS     = QuizWords.POS;
  var CHOICES = QuizWords.CHOICES;
  var split   = QuizHelpers.splitWord;

  function buildWordDisplay(q, level, answered, isCorrect) {
    var parts = split(q.word, q.suffix);
    var hasSuffix = q.suffix !== '';

    if (!answered) {
      if (level === 1 && hasSuffix) {
        return '<div class="word-display">' + q.suffix + '</div>';
      }
      return '<div class="word-display">' + q.word + '</div>';
    }

    var wordHtml;
    if (hasSuffix) {
      wordHtml = '<div class="word-display">' +
        '<span class="word-stem">' + parts.stem + '</span>' +
        '<span class="word-tail">' + parts.tail + '</span>' +
        '</div>';
      if (level === 1) {
        wordHtml += '<div class="word-full-reveal">' + q.word + '</div>';
      }
    } else {
      wordHtml = '<div class="word-display">' + q.word + '</div>';
    }

    var feedbackHtml = isCorrect
      ? '<span class="feedback-tag ok">正解</span>'
      : '<span class="feedback-tag ng">不正解</span>' +
        '<span class="feedback-correct-label">正解：<strong>' + POS[q.pos].ja + '</strong></span>';

    return wordHtml +
      '<div class="word-ja">' + q.ja + '</div>' +
      '<div class="answer-feedback">' + feedbackHtml + '</div>';
  }

  function render(container, state, callbacks) {
    var q          = state.questions[state.idx];
    var answered   = state.answered;
    var selected   = state.selected;
    var level      = state.level;
    var isCorrect  = answered && selected === q.pos;
    var progress   = ((state.idx + (answered ? 1 : 0)) / state.questions.length) * 100;

    var choicesHtml = CHOICES.map(function (pos) {
      var cls = 'choice-btn';
      if (answered) {
        if (pos === selected && pos === q.pos)      cls += ' sel-correct';
        else if (pos === selected && pos !== q.pos) cls += ' sel-wrong';
        else if (pos === q.pos)                     cls += ' is-answer';
        else                                         cls += ' dimmed';
      }
      return '<button class="' + cls + '" data-pos="' + pos + '"' + (answered ? ' disabled' : '') + '>' +
        '<span class="c-ja">' + POS[pos].ja + '</span>' +
        '<span class="c-en">' + POS[pos].en + '</span>' +
        '</button>';
    }).join('');

    var nextRowHtml = answered
      ? '<div class="next-row">' +
          '<div class="space-hint"><span class="key-badge">Space</span> または</div>' +
          '<button class="next-btn" id="nextBtn">次へ →</button>' +
        '</div>'
      : '';

    var el = document.createElement('div');
    el.className = 'screen';
    el.innerHTML =
      '<div class="quiz-meta">' +
        '<div class="quiz-progress"><strong>' + (state.idx + 1) + '</strong> / ' + state.questions.length + '</div>' +
        '<div class="quiz-level-badge">Lv.' + level + '</div>' +
        '<div class="quiz-timer' + (answered ? ' recorded' : '') + '" id="quizTimer">' +
          (answered ? state.recordedTime + 's' : state.liveTime + 's') +
        '</div>' +
      '</div>' +
      '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + progress + '%"></div></div>' +
      '<div class="word-card' + (answered ? (isCorrect ? ' correct' : ' incorrect') : '') + '">' +
        buildWordDisplay(q, level, answered, isCorrect) +
      '</div>' +
      '<div class="choices">' + choicesHtml + '</div>' +
      nextRowHtml;

    el.querySelectorAll('[data-pos]').forEach(function (btn) {
      btn.addEventListener('click', function () { callbacks.onAnswer(btn.dataset.pos); });
    });
    var nextBtn = el.querySelector('#nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', callbacks.onNext);

    container.appendChild(el);
  }

  function updateTimer(container, time) {
    var el = container.querySelector('#quizTimer');
    if (el && !el.classList.contains('recorded')) {
      el.textContent = time + 's';
    }
  }

  return { render: render, updateTimer: updateTimer };
})();
  </script>

/**
 * components/ResultScreen.js
 * 結果・履歴画面を描画。グローバル ResultScreen として公開。

var ResultScreen = (function () {
  var POS         = QuizWords.POS;
  var getLog      = QuizStorage.getLog;
  var formatDate  = QuizStorage.formatDate;

  var LEVEL_LABEL = { 1: 'Lv.1 語尾', 2: 'Lv.2 単語', 3: 'Lv.3 不規則' };

  function render(container, state, callbacks) {
    var results  = state.results;
    var level    = state.level;
    var correct  = results.filter(function (r) { return r.correct; }).length;
    var total    = results.length;
    var pct      = Math.round((correct / total) * 100);
    var avgTime  = (results.reduce(function (s, r) { return s + r.time; }, 0) / total).toFixed(1);
    var bestTime = Math.min.apply(null, results.map(function (r) { return r.time; })).toFixed(1);
    var miss     = total - correct;

    var log      = getLog();
    var logTotal = log.length;

    // Answer list
    var answerListHtml = results.map(function (r) {
      var ok = r.correct;
      var posHtml = ok
        ? '<span class="ok-pos">' + POS[r.answer].ja + '</span>'
        : '<span class="ng-pos">' + POS[r.selected].ja + '</span><span class="ok-pos">' + POS[r.answer].ja + '</span>';
      return '<div class="result-item">' +
        '<div class="r-dot ' + (ok ? 'ok' : 'ng') + '"></div>' +
        '<div style="flex:1;min-width:0">' +

          '<div class="r-word-ja">' + r.ja + '</div>' +
        '</div>' +
        '<div class="r-pos">' + posHtml + '</div>' +
        '<div class="r-time">' + r.time.toFixed(1) + 's</div>' +
        '</div>';

    // History log

      logHtml = log.slice(0, 8).map(function (entry, i) {

          '<span class="log-date">' + formatDate(entry.date) + '</span>' +
          (isCurrent ? '<span class="now-badge">今回</span>' : '') +
          '<span class="log-lv">Lv.' + entry.level + '</span>' +
          '<span class="log-score">' + entry.score + '/' + entry.total + '</span>' +
          '<span class="log-avgtime">avg ' + entry.avgTime + 's</span>' +
          '</div>';
      }).join('');
    }

    var el = document.createElement('div');
    el.className = 'screen';
    el.style.justifyContent = 'flex-start';
    el.style.paddingTop = '2.5rem';
    el.style.paddingBottom = '2.5rem';

    el.innerHTML =
      '<div class="result-header">' +
        '<div class="result-score">' + correct + '<span class="r-denom"> / ' + total + '</span></div>' +
        '<div class="result-pct">正答率 ' + pct + '% | ' + LEVEL_LABEL[level] + '</div>' +
      '</div>' +
      '<div class="result-stats">' +
        '<div class="r-stat"><span class="sv">' + avgTime + 's</span><div class="sl">平均タイム</div></div>' +
        '<div class="r-stat"><span class="sv">' + bestTime + 's</span><div class="sl">最速</div></div>' +
        '<div class="r-stat"><span class="sv">' + miss + '</span><div class="sl">ミス</div></div>' +
      '</div>' +
      '<div class="section-label" style="margin-bottom:.5rem">回答内訳</div>' +
      '<div class="result-list">' + answerListHtml + '</div>' +
      (log.length > 0
        ? '<div class="log-section">' +
            '<div class="log-header">' +
              '<div class="section-label" style="margin-bottom:0">履歴</div>' +
              '<div class="log-count">累計 ' + logTotal + ' 回</div>' +
            '</div>' +
            '<div class="log-list" style="margin-top:.5rem">' + logHtml + '</div>' +
          '</div>'
        : '') +
      '<button class="restart-btn" id="restartBtn">もう一度</button>';

    el.querySelector('#restartBtn').addEventListener('click', callbacks.onRestart);
    container.appendChild(el);
  }

  return { render: render };
})();

  <script>
/**
 * app.js
 * アプリケーション状態管理・画面遷移。
 * 他の全スクリプトが読み込まれた後に実行される。
 */

(function () {
  var REGULAR   = QuizWords.REGULAR_WORDS;
  var IRREGULAR = QuizWords.IRREGULAR_WORDS;
  var shuffle   = QuizHelpers.shuffle;
  var fmtTime   = QuizHelpers.fmtTime;
  var saveResult = QuizStorage.saveResult;

  // ── State ─────────────────────────────────────────────────────────────────
  var state = {
    phase:        'start',
    numQ:         10,
    level:        1,
    questions:    [],
    idx:          0,
    answered:     false,
    selected:     null,
    results:      [],
    startTime:    null,
    liveTime:     '0.0',
    recordedTime: '0.0',
  };

  var timerInterval = null;
  var app = document.getElementById('app');

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    app.innerHTML = '';

    if (state.phase === 'start') {
      StartScreen.render(app, state, {
        setNumQ:  function (n) { state.numQ = n; render(); },
        setLevel: function (l) { state.level = l; render(); },
        onStart:  startGame,
      });

    } else if (state.phase === 'quiz') {
      QuizScreen.render(app, state, {
        onAnswer: handleAnswer,
        onNext:   advance,
      });
      if (!state.answered) startTimer();

    } else if (state.phase === 'result') {
      ResultScreen.render(app, state, {
        onRestart: function () { state.phase = 'start'; render(); },
      });
    }
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  function startTimer() {
    clearInterval(timerInterval);
    state.startTime = Date.now();
    state.liveTime  = '0.0';

    timerInterval = setInterval(function () {
      state.liveTime = fmtTime((Date.now() - state.startTime) / 1000);
      QuizScreen.updateTimer(app, state.liveTime);
    }, 100);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    state.recordedTime = fmtTime((Date.now() - state.startTime) / 1000);
  }

  // ── Game flow ─────────────────────────────────────────────────────────────
  function startGame() {
    var pool = state.level === 3 ? IRREGULAR : REGULAR;
    state.questions    = shuffle(pool).slice(0, state.numQ);
    state.idx          = 0;
    state.results      = [];
    state.answered     = false;
    state.selected     = null;
    state.liveTime     = '0.0';
    state.recordedTime = '0.0';
    state.phase        = 'quiz';
    render();
  }

  function handleAnswer(pos) {
    if (state.answered) return;
    stopTimer();

    var q = state.questions[state.idx];
    state.selected = pos;
    state.answered = true;
    state.results.push({
      word:     q.word,
      suffix:   q.suffix,
      ja:       q.ja,
      pos:      q.pos,
      answer:   q.pos,
      selected: pos,
      correct:  pos === q.pos,
      time:     parseFloat(state.recordedTime),
    });

    render();
  }

  function advance() {
    if (!state.answered) return;

    if (state.idx + 1 >= state.questions.length) {
      var results = state.results;
      var correct = results.filter(function (r) { return r.correct; }).length;
      var avg = parseFloat(
        (results.reduce(function (s, r) { return s + r.time; }, 0) / results.length).toFixed(1)
      );
      saveResult({
        date:    new Date().toISOString(),
        score:   correct,
        total:   results.length,
        avgTime: avg,
        level:   state.level,
      });
      state.phase = 'result';
      render();
    } else {
      state.idx++;
      state.answered     = false;
      state.selected     = null;
      state.liveTime     = '0.0';
      state.recordedTime = '0.0';
      render();
    }
  }

  // ── Keyboard ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space' && state.phase === 'quiz' && state.answered) {
      e.preventDefault();
      advance();
    }
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  render();
})();
  </script>
